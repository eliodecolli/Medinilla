# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        version: "29.2"
        
    - name: Build Shared Contracts
      run: |
        dotnet build Medinilla.Core.SharedContracts/Medinilla.Core.SharedContracts.csproj --no-restore -c Debug -o ./bin/Debug/net8.0

    - name: Build
      run: dotnet build --no-restore
      
    - name: Debug - List compiled files
      if: always()
      run: |
        cd Medinilla.Core.SharedContracts/compiled
        ls -la
        
    - name: Test
      run: dotnet test --no-build --verbosity normal
